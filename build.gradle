// Tachyon — single unified build (MC 26.1.2 / JDK 25). MC 26.1 ships UNOBFUSCATED, so we use
// the non-remapping net.fabricmc.fabric-loom plugin, declare NO mappings (names are native
// Mojang), and use implementation/jar (not modImplementation/remapJar).
//
// This one build does everything that used to be split across two branches:
//   • builds + runs the real Fabric server mod (./gradlew build, ./gradlew runServer)
//   • runs the MC-independent engine self-test + benchmarks WITHOUT booting MC
//     (./gradlew selfTest | noiseBench | entityBench | ffmBench — see "core runners" below)
//   • runs the JUnit determinism/parity suite (./gradlew test)
plugins {
    id 'net.fabricmc.fabric-loom' version '1.17.11'
    id 'java'
}

version = project.mod_version
group = project.maven_group

base {
    archivesName = project.archives_base_name
}

repositories {
    maven { name = 'Fabric'; url = 'https://maven.fabricmc.net/' }
    mavenCentral()
}

dependencies {
    // No `mappings` line: 26.1 is unobfuscated and Loom does not remap it.
    minecraft "com.mojang:minecraft:${project.minecraft_version}"
    implementation "net.fabricmc:fabric-loader:${project.loader_version}"
    implementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"

    testImplementation platform('org.junit:junit-bom:5.11.4')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

loom {
    accessWidenerPath = file("src/main/resources/tachyon.accesswidener")
    runConfigs.configureEach {
        vmArgs(
            '--add-modules=jdk.incubator.vector',
            '--enable-native-access=ALL-UNNAMED',
            '-Dtachyon.dev=true',
            '-XX:+UseCompactObjectHeaders'
        )
    }
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
    withSourcesJar()
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.release = 25
    options.compilerArgs += ['--add-modules', 'jdk.incubator.vector']
}

test {
    useJUnitPlatform()
    jvmArgs '--add-modules=jdk.incubator.vector', '--enable-native-access=ALL-UNNAMED'
}

processResources {
    inputs.property "version", project.version
    filesMatching("fabric.mod.json") {
        expand "version": project.version
    }
}

// --- Standalone core runners (MC-independent: self-test + benchmarks, no server boot) ---
// The dev.tachyon.* engine core does not import any Minecraft class, so these mains run on
// the plain runtime classpath. This preserves the fast iteration loop the old `main` branch
// had via the `application` plugin, now inside the single unified Loom build.
def coreJvmArgs = [
    '--add-modules=jdk.incubator.vector',
    '--enable-native-access=ALL-UNNAMED',
    '-XX:+UseCompactObjectHeaders'
]

def registerCoreRunner = { String taskName, String mainCls, String desc ->
    tasks.register(taskName, JavaExec) {
        group = 'tachyon'
        description = desc
        mainClass = mainCls
        classpath = sourceSets.main.runtimeClasspath
        jvmArgs = coreJvmArgs
    }
}

registerCoreRunner('selfTest',   'dev.tachyon.SelfTestRunner',  'Run the standalone engine self-test (no Minecraft).')
registerCoreRunner('noiseBench',  'dev.tachyon.NoiseBench',      'Benchmark: SIMD vs scalar worldgen noise.')
registerCoreRunner('entityBench', 'dev.tachyon.EntityBench',     'Benchmark: parallel entity-tick engine (threads × SIMD).')
registerCoreRunner('ffmBench',    'dev.tachyon.FfmScratchBench', 'Benchmark: FFM off-heap scratch vs heap GC.')

// `run` keeps parity with the old core build (alias for the self-test).
tasks.register('run') {
    group = 'tachyon'
    description = 'Alias for selfTest (parity with the former standalone core build).'
    dependsOn 'selfTest'
}
