// Fabric/MC 26.1 build (branch fabric-26.1). MC 26.1 ships UNOBFUSCATED, so we use the
// non-remapping net.fabricmc.fabric-loom plugin, declare NO mappings (names are native
// Mojang), and use implementation/jar (not modImplementation/remapJar). See plan Phase 2.
plugins {
    id 'net.fabricmc.fabric-loom' version '1.17.11'
    id 'java'
}

version = project.mod_version
group = project.maven_group

base {
    archivesName = project.archives_base_name
}

repositories {
    maven { name = 'Fabric'; url = 'https://maven.fabricmc.net/' }
    mavenCentral()
}

dependencies {
    // No `mappings` line: 26.1 is unobfuscated and Loom does not remap it.
    minecraft "com.mojang:minecraft:${project.minecraft_version}"
    implementation "net.fabricmc:fabric-loader:${project.loader_version}"
    implementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"

    testImplementation platform('org.junit:junit-bom:5.11.4')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

loom {
    accessWidenerPath = file("src/main/resources/tachyon.accesswidener")
    runConfigs.configureEach {
        vmArgs(
            '--add-modules=jdk.incubator.vector',
            '--enable-native-access=ALL-UNNAMED',
            '-Dtachyon.dev=true',
            '-XX:+UseCompactObjectHeaders'
        )
    }
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
    withSourcesJar()
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.release = 25
    options.compilerArgs += ['--add-modules', 'jdk.incubator.vector']
}

test {
    useJUnitPlatform()
    jvmArgs '--add-modules=jdk.incubator.vector', '--enable-native-access=ALL-UNNAMED'
}

processResources {
    inputs.property "version", project.version
    filesMatching("fabric.mod.json") {
        expand "version": project.version
    }
}
