// Active build: the Minecraft-independent Tachyon engine core (library + self-test
// runner), validated on JDK 25. The Fabric/Loom build that wraps this into a server
// mod is staged in build.fabric.gradle.txt — swap it in once MC 26.1.2 dev mappings
// are published (see README).
plugins {
    id 'java'
    id 'application'
}

group = project.maven_group
version = project.mod_version

repositories {
    mavenCentral()
}

dependencies {
    testImplementation platform('org.junit:junit-bom:5.11.4')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
    withSourcesJar()
}

sourceSets {
    main {
        java {
            // Exclude the MC/Fabric integration layer from the core build (needs Loom).
            exclude 'dev/tachyon/TachyonMod.java'
            exclude 'dev/tachyon/ServerActuators.java'
            exclude 'dev/tachyon/command/**'
        }
        // fabric.mod.json / mixins / accesswidener are for the Fabric build only.
        resources {
            srcDirs = []
        }
    }
}

application {
    mainClass = 'dev.tachyon.SelfTestRunner'
    applicationDefaultJvmArgs = [
        '--add-modules=jdk.incubator.vector',
        '--enable-native-access=ALL-UNNAMED',
        '-XX:+UseCompactObjectHeaders'
    ]
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.compilerArgs += ['--add-modules', 'jdk.incubator.vector']
}

test {
    useJUnitPlatform()
    jvmArgs '--add-modules=jdk.incubator.vector', '--enable-native-access=ALL-UNNAMED'
}

jar {
    manifest {
        attributes('Main-Class': 'dev.tachyon.SelfTestRunner')
    }
}
